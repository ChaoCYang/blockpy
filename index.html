<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockPy × Pyodide — Stage 5 Bridge</title>
<script src="https://unpkg.com/blockly@10.4.3/blockly_compressed.js"></script>
<script src="https://unpkg.com/blockly@10.4.3/blocks_compressed.js"></script>
<script src="https://unpkg.com/blockly@10.4.3/python_compressed.js"></script>
<script src="https://unpkg.com/blockly@10.4.3/msg/zh-hant.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;
  --accent:#58a6ff;--green:#3fb950;--warn:#f0883e;
  --danger:#ff7b72;--purple:#bc8cff;--orange:#f39c12;
  --teal:#1abc9c;--text:#e6edf3;--muted:#8b949e;--r:8px;
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── Header ── */
header{display:flex;align-items:center;gap:7px;padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:nowrap;}
.logo{display:flex;align-items:center;gap:6px;font-weight:700;font-size:13px;white-space:nowrap;}
.logo-icon{width:24px;height:24px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.badge{font-size:9.5px;font-weight:600;padding:2px 6px;border-radius:20px;background:rgba(188,140,255,.15);color:var(--purple);border:1px solid rgba(188,140,255,.3);white-space:nowrap;}
.spacer{flex:1;}

/* lang switcher */
.lang-switcher{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;flex-shrink:0;}
.lang-btn{padding:3px 9px;border:none;background:transparent;color:var(--muted);font-family:'Sora',sans-serif;font-size:10.5px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.lang-btn.active{background:linear-gradient(135deg,#c0392b,#922b21);color:#fff;font-weight:700;}
.lang-btn.active.zh{background:linear-gradient(135deg,#2471a3,#1a5276);}
.lang-btn.active.en{background:linear-gradient(135deg,#1e8449,#145a32);}
.lang-btn:hover:not(.active){color:var(--text);background:rgba(255,255,255,.05);}

/* engine pill */
#engineStatus{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--muted);padding:3px 8px;border-radius:20px;border:1px solid var(--border);background:var(--bg);transition:all .3s;white-space:nowrap;flex-shrink:0;}
#engineStatus .dot{width:6px;height:6px;border-radius:50%;background:var(--warn);animation:pulse 1.5s infinite;flex-shrink:0;}
#engineStatus.ready .dot{background:var(--green);animation:none;}
#engineStatus.ready{color:var(--green);border-color:rgba(63,185,80,.35);}
#engineStatus.loading-sklearn .dot{background:var(--orange);animation:pulse 1s infinite;}
#engineStatus.loading-sklearn{color:var(--orange);}
#engineStatus.error .dot{background:var(--danger);animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* mode toggle */
.mode-toggle{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;flex-shrink:0;}
.mode-toggle button{padding:3px 10px;border:none;background:transparent;color:var(--muted);font-family:'Sora',sans-serif;font-size:10.5px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.mode-toggle button.active{background:var(--accent);color:#0d1117;font-weight:700;}

/* toolbar */
.toolbar{display:flex;gap:4px;flex-shrink:0;}
.btn{display:flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'Sora',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:hover{background:#21262d;border-color:var(--accent);color:var(--accent);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#0d1117;font-weight:700;}
.btn.primary:hover{background:#79c0ff;}
.btn.primary:disabled{opacity:.45;cursor:not-allowed;}
.btn.export-py:hover{border-color:var(--green);color:var(--green);}
.btn.export-png:hover{border-color:var(--purple);color:var(--purple);}
.btn.danger:hover{border-color:var(--danger);color:var(--danger);}

/* ── Main ── */
main{display:flex;flex:1;overflow:hidden;}

/* 左欄：Blockly */
#blocklyPane{flex:1;min-width:200px;display:flex;flex-direction:column;overflow:hidden;}
#blocklyDiv{flex:1;display:block;}

/* 中欄：Python 程式碼（永遠顯示） */
#codePane{width:320px;min-width:160px;display:flex;flex-direction:column;border-left:1px solid var(--border);border-right:1px solid var(--border);overflow:hidden;flex-shrink:0;}
#codeEditor{flex:1;background:#090d12;color:#a5d6ff;font-family:'JetBrains Mono',monospace;font-size:12.5px;border:none;outline:none;resize:none;padding:14px 16px;line-height:1.7;tab-size:4;}

.pane-label{font-size:10px;font-weight:600;letter-spacing:.8px;color:var(--muted);padding:5px 12px;background:var(--surface);border-bottom:1px solid var(--border);text-transform:uppercase;flex-shrink:0;display:flex;align-items:center;gap:6px;}
.dot2{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

/* 可拖曳分隔線（中欄右邊 / 右欄左邊） */
.resizer{width:4px;cursor:col-resize;background:var(--border);flex-shrink:0;transition:background .15s;}
.resizer:hover{background:var(--accent);}
/* 向下相容舊 id */
#resizer{width:4px;cursor:col-resize;background:var(--border);flex-shrink:0;transition:background .15s;}
#resizer:hover{background:var(--accent);}

#rightPane{width:400px;min-width:260px;display:flex;flex-direction:column;flex-shrink:0;}

/* tabs */
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab-btn{flex:1;padding:6px 3px;border:none;background:transparent;color:var(--muted);font-family:'Sora',sans-serif;font-size:10.5px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:3px;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-btn:hover:not(.active){color:var(--text);}

#outputTab,#canvasTab,#varTab,#galleryTab{flex:1;display:none;flex-direction:column;overflow:hidden;}
#outputTab.active,#canvasTab.active,#varTab.active,#galleryTab.active{display:flex;}

/* output */
#outputBox{flex:1;background:#090d12;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#e6edf3;padding:10px 12px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;line-height:1.7;}
.line-out{color:#e6edf3;display:block;}.line-err{color:var(--danger);display:block;}.line-info{color:var(--accent);font-style:italic;display:block;}.line-ok{color:var(--green);display:block;}.line-warn{color:var(--warn);display:block;}

/* canvas */
#canvasTab{background:#090d12;align-items:center;justify-content:center;padding:8px;gap:6px;}
.canvas-toolbar{display:flex;gap:5px;align-items:center;width:100%;flex-shrink:0;}
.canvas-toolbar label{font-size:11px;color:var(--muted);}
#drawCanvas{background:#fff;border-radius:6px;border:2px solid var(--border);max-width:100%;max-height:calc(100% - 36px);cursor:crosshair;display:block;}

/* variables */
#varBox{flex:1;overflow-y:auto;padding:10px 12px;background:#090d12;}
.var-row{display:flex;gap:7px;align-items:flex-start;font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 0;border-bottom:1px solid rgba(48,54,61,.5);}
.var-name{color:var(--accent);min-width:75px;font-weight:600;}.var-type{color:var(--muted);font-size:10px;padding-top:1px;min-width:48px;}.var-val{color:#e6edf3;word-break:break-all;}

/* ── Gallery ── */
#galleryTab{overflow-y:auto;background:#090d12;padding:10px;}
.gallery-section{margin-bottom:14px;}
.gallery-section h3{font-size:10.5px;font-weight:600;letter-spacing:.7px;color:var(--muted);text-transform:uppercase;margin-bottom:7px;padding:0 2px;}
.gallery-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.gallery-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 11px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.gallery-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 60%,rgba(255,255,255,.02));pointer-events:none;}
.gallery-card:hover{border-color:var(--accent);background:#1c2128;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3);}
.gallery-card:active{transform:translateY(0);}
.gallery-card .card-icon{font-size:22px;margin-bottom:5px;display:block;}
.gallery-card .card-title{font-size:11.5px;font-weight:600;color:var(--text);margin-bottom:3px;}
.gallery-card .card-desc{font-size:10.5px;color:var(--muted);line-height:1.45;}
.gallery-card .card-tag{display:inline-block;font-size:9.5px;font-weight:600;padding:1px 5px;border-radius:20px;margin-top:5px;}
.tag-draw{background:rgba(155,89,182,.2);color:var(--purple);border:1px solid rgba(155,89,182,.3);}
.tag-numpy{background:rgba(52,152,219,.2);color:#5dade2;border:1px solid rgba(52,152,219,.3);}
.tag-sklearn{background:rgba(26,188,156,.2);color:var(--teal);border:1px solid rgba(26,188,156,.3);}
.gallery-card .card-mode{position:absolute;top:7px;right:7px;font-size:9px;color:var(--muted);background:rgba(255,255,255,.06);padding:1px 5px;border-radius:10px;}

/* loading overlay */
#langOverlay{display:none;position:fixed;inset:0;background:rgba(13,17,23,.7);backdrop-filter:blur(4px);z-index:999;align-items:center;justify-content:center;font-size:14px;color:var(--accent);}
#langOverlay.visible{display:flex;}


/* ── Bridge status pill ── */
#bridgeStatus{
  display:flex;align-items:center;gap:5px;font-size:10px;
  color:var(--muted);padding:3px 9px;border-radius:20px;
  border:1px solid var(--border);background:var(--bg);
  transition:all .3s;white-space:nowrap;flex-shrink:0;
  cursor:pointer;position:relative;
}
#bridgeStatus .bdot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;}
#bridgeStatus.bs-ok  .bdot{background:var(--green);}
#bridgeStatus.bs-ok {color:var(--green);border-color:rgba(63,185,80,.35);}
#bridgeStatus.bs-off .bdot{background:var(--warn);}
#bridgeStatus.bs-off{color:var(--warn);border-color:rgba(240,136,62,.4);}
/* URL popup */
#bPopup{
  display:none;position:absolute;top:115%;right:0;z-index:200;
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:11px 14px;min-width:280px;
  box-shadow:0 6px 24px rgba(0,0,0,.5);
}
#bPopup.open{display:block;}
#bPopup label{font-size:10px;color:var(--muted);display:block;margin-bottom:5px;}
#bPopup input{
  width:100%;background:#090d12;border:1px solid var(--border);
  border-radius:5px;padding:5px 8px;color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;
}
#bPopup input:focus{border-color:var(--accent);}
#bPopup .bstats{
  margin-top:9px;font-size:10px;color:var(--muted);
  font-family:'JetBrains Mono',monospace;line-height:1.75;
}
/* Bridge tab panel */
#bridgeTab{flex:1;display:none;flex-direction:column;overflow:hidden;background:#090d12;}
#bridgeTab.active{display:flex;}
#bridgeLog{
  flex:1;font-family:'JetBrains Mono',monospace;font-size:11px;
  padding:10px 12px;overflow-y:auto;white-space:pre-wrap;
  word-break:break-all;line-height:1.7;
}
.bl-send{color:#f0883e;display:block;}
.bl-recv{color:#3fb950;display:block;}
.bl-info{color:var(--accent);font-style:italic;display:block;}
.bl-err {color:var(--danger);display:block;}
/* Bridge colour tag */
.tag-bridge{background:rgba(243,156,18,.15);color:#f39c12;border:1px solid rgba(243,156,18,.3);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<!-- file:// warning banner -->
<div id="fileBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:998;
  background:linear-gradient(135deg,#78350f,#92400e);
  border-top:2px solid #f59e0b;
  padding:8px 16px;font-size:11px;color:#fef3c7;
  display:flex;align-items:center;gap:12px;">
  <span>⚠️ 從檔案直接開啟</span>
  <span style="opacity:.75">橋接功能建議從橋接器開啟：先啟動 blockpy_bridge.py，再點「🌐 開啟工具」</span>
  <button onclick="document.getElementById('fileBanner').style.display='none'"
    style="margin-left:auto;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);
    border-radius:5px;padding:2px 8px;color:#fef3c7;cursor:pointer;font-size:11px;">✕ 知道了</button>
</div>
<script>
  if (location.protocol === 'file:') {
    document.getElementById('fileBanner').style.display = 'flex';
  }
</script>

<div id="langOverlay"><span>🌐 <span id="langOverlayText">切換語系中…</span></span></div>

<header>
  <div class="logo">
    <div class="logo-icon">⬡</div>
    BlockPy <span style="opacity:.4;font-weight:300;margin:0 2px">×</span> Pyodide
  </div>
  <span class="badge">Stage 5 · Bridge</span>

  <div class="lang-switcher">
    <button class="lang-btn zh active" id="langBtnZh" onclick="switchLang('zh')">🇹🇼 中文</button>
    <button class="lang-btn vi"        id="langBtnVi" onclick="switchLang('vi')">🇻🇳 Tiếng Việt</button>
    <button class="lang-btn en"        id="langBtnEn" onclick="switchLang('en')">🇬🇧 English</button>
  </div>

  <div class="spacer"></div>

  <div id="bridgeStatus" class="bs-off" onclick="toggleBPopup()">
    <div class="bdot"></div>
    <span id="bLabel">🔌 橋接 ─</span>
    <div id="bPopup">
      <label>Bridge Server URL</label>
      <input id="bUrlInput" value="http://127.0.0.1:8765"
             onchange="setBridgeUrl(this.value)"
             onclick="event.stopPropagation()">
      <div class="bstats" id="bStats">等待連線...</div>
      <button onclick="checkBridgeStatus();event.stopPropagation();" style="margin-top:8px;width:100%;padding:4px;background:#21262d;border:1px solid #30363d;border-radius:5px;color:#e6edf3;font-size:10px;cursor:pointer;">🔄 重新連線</button>
    </div>
  </div>
    <div id="engineStatus"><div class="dot"></div><span id="engineLabel">…</span></div>

  <div class="toolbar">
    <button class="btn export-py"  onclick="exportPy()"  title="下載 .py"><span data-i18n="btnExportPy"></span></button>
    <button class="btn export-png" onclick="exportPng()" title="下載 PNG"><span data-i18n="btnExportPng"></span></button>
    <button class="btn danger"     onclick="clearOutput()">✕ <span data-i18n="btnClearOutput"></span></button>
    <button class="btn primary" id="runBtn" onclick="runCode()" disabled>▶ <span data-i18n="btnRun"></span></button>
  </div>
</header>

<main>
  <!-- 左欄：Blockly 積木 -->
  <div id="blocklyPane">
    <div class="pane-label">
      <span class="dot2" style="background:var(--accent)"></span>
      <span data-i18n="modeBlock">⬡ 積木編輯器</span>
    </div>
    <div id="blocklyDiv"></div>
  </div>

  <!-- 可拖曳分隔線 A（Blockly ↔ Python） -->
  <div class="resizer" id="resizerA"></div>

  <!-- 中欄：Python 程式碼（永遠可見，與積木同步） -->
  <div id="codePane">
    <div class="pane-label" style="justify-content:space-between;">
      <span style="display:flex;align-items:center;gap:6px;">
        <span class="dot2" style="background:var(--green)"></span>
        <span>{ } Python</span>
      </span>
      <span id="codeEditHint" style="font-size:9px;color:var(--warn);display:none;">✏️ 手動編輯中</span>
    </div>
    <textarea id="codeEditor" spellcheck="false"></textarea>
  </div>

  <!-- 可拖曳分隔線 B（Python ↔ 右欄） -->
  <div class="resizer" id="resizer"></div>

  <div id="rightPane">
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-output"  onclick="switchTab('output')">📋 <span data-i18n="tabOutput"></span></button>
      <button class="tab-btn"        id="tab-canvas"  onclick="switchTab('canvas')">🎨 <span data-i18n="tabCanvas"></span></button>
      <button class="tab-btn"        id="tab-gallery" onclick="switchTab('gallery')">📚 <span data-i18n="tabGallery"></span></button>
      <button class="tab-btn"        id="tab-var"     onclick="switchTab('var')">📊 <span data-i18n="tabVar"></span></button>
      <button class="tab-btn"        id="tab-bridge"  onclick="switchTab('bridge')">🔌 <span data-i18n="tabBridge"></span></button>
    </div>

    <!-- Output -->
    <div id="outputTab" class="active">
      <div id="outputBox"><span class="line-info">Pyodide init…</span>
</div>
    </div>

    <!-- Canvas -->
    <div id="canvasTab">
      <div class="canvas-toolbar">
        <label data-i18n="canvasSize"></label>
        <select id="canvasSizeSelect" onchange="resizeCanvas()" style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:2px 6px;font-size:11px;">
          <option value="360,270">360×270</option>
          <option value="480,360" selected>480×360</option>
          <option value="600,450">600×450</option>
        </select>
        <span id="canvasSizeLabel" style="font-size:11px;color:var(--muted);margin-left:auto;">480×360</span>
      </div>
      <canvas id="drawCanvas" width="480" height="360"></canvas>
    </div>

    <!-- Gallery -->
    <div id="galleryTab">
      <div id="galleryContent"></div>
    </div>

    <!-- Bridge Log -->
    <div id="bridgeTab">
      <div id="bridgeLog"><span class="bl-info">等待橋接器連線…
請先執行 blockpy_bridge.py 並啟動橋接器

然後在工具箱 🔌 橋接 分類找到積木
</span></div>
    </div>

    <!-- Variables -->
    <div id="varTab">
      <div id="varBox">
        <div id="varContent" style="color:var(--muted);font-size:12px;padding:8px 0;" data-i18n-content="varEmpty"></div>
      </div>
    </div>
  </div>
</main>

<script>
// ═══════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════

let currentLang = 'zh';
const T = () => LANG_TABLE[currentLang];

// ═══════════════════════════════════════════════════════════════════════
//  S1 ── BLOCK DEFINITIONS
// ═══════════════════════════════════════════════════════════════════════
function defineCustomBlocks(){
  const t = T();
  // ── Drawing blocks ────────────────────────────────────────────────
  Blockly.Blocks['draw_clear']={init(){this.appendDummyInput().appendField(t.blkClear);this.setPreviousStatement(true);this.setNextStatement(true);this.setColour('#9B59B6');this.setTooltip(t.tipClear);}};
  Blockly.Blocks['draw_set_bg']={init(){this.appendDummyInput().appendField(t.blkBg).appendField(new Blockly.FieldColour('#ffffff'),'COLOR');this.setPreviousStatement(true);this.setNextStatement(true);this.setColour('#9B59B6');this.setTooltip(t.tipBg);}};
  Blockly.Blocks['draw_set_stroke']={init(){this.appendDummyInput().appendField(t.blkStroke).appendField(new Blockly.FieldColour('#000000'),'COLOR').appendField(t.blkStrokeW).appendField(new Blockly.FieldNumber(2,.5,50,.5),'WIDTH');this.setPreviousStatement(true);this.setNextStatement(true);this.setColour('#9B59B6');this.setTooltip(t.tipStroke);}};
  Blockly.Blocks['draw_set_fill']={init(){this.appendDummyInput().appendField(t.blkFill).appendField(new Blockly.FieldColour('#ff0000'),'COLOR');this.setPreviousStatement(true);this.setNextStatement(true);this.setColour('#9B59B6');this.setTooltip(t.tipFill);}};
  Blockly.Blocks['draw_line']={init(){this.appendDummyInput().appendField(t.blkLine).appendField(new Blockly.FieldNumber(50,0),'X1').appendField(',').appendField(new Blockly.FieldNumber(50,0),'Y1').appendField(t.blkLineTo).appendField(new Blockly.FieldNumber(250,0),'X2').appendField(',').appendField(new Blockly.FieldNumber(200,0),'Y2').appendField(t.blkLineEnd);this.setPreviousStatement(true);this.setNextStatement(true);this.setColour('#E74C3C');this.setTooltip(t.tipLine);}};
  Blockly.Blocks['draw_rect']={init(){this.appendDummyInput().appendField(t.blkRect).appendField(new Blockly.FieldNumber(60,0),'X').appendField(',').appendField(new Blockly.FieldNumber(60,0),'Y').appendField(t.blkRectW).appendField(new Blockly.FieldNumber(120,1),'W').appendField(t.blkRectH).appendField(new Blockly.FieldNumber(80,1),'H').appendField(t.blkRectFill).appendField(new Blockly.FieldCheckbox('TRUE'),'FILL');this.setPreviousStatement(true);this.setNextStatement(true);this.setColour('#27AE60');this.setTooltip(t.tipRect);}};
  Blockly.Blocks['draw_circle']={init(){this.appendDummyInput().appendField(t.blkCircle).appendField(new Blockly.FieldNumber(150,0),'CX').appendField(',').appendField(new Blockly.FieldNumber(150,0),'CY').appendField(t.blkCircleR).appendField(new Blockly.FieldNumber(60,1),'R').appendField(t.blkCircleFill).appendField(new Blockly.FieldCheckbox('TRUE'),'FILL');this.setPreviousStatement(true);this.setNextStatement(true);this.setColour('#3498DB');this.setTooltip(t.tipCircle);}};
  Blockly.Blocks['draw_ellipse']={init(){this.appendDummyInput().appendField(t.blkEllipse).appendField(new Blockly.FieldNumber(150,0),'CX').appendField(',').appendField(new Blockly.FieldNumber(150,0),'CY').appendField(t.blkEllipseRx).appendField(new Blockly.FieldNumber(80,1),'RX').appendField(t.blkEllipseRy).appendField(new Blockly.FieldNumber(50,1),'RY').appendField(t.blkEllipseFill).appendField(new Blockly.FieldCheckbox('TRUE'),'FILL');this.setPreviousStatement(true);this.setNextStatement(true);this.setColour('#E67E22');this.setTooltip(t.tipEllipse);}};
  Blockly.Blocks['draw_polygon']={init(){this.appendDummyInput().appendField(t.blkPoly).appendField(new Blockly.FieldNumber(6,3,20,1),'SIDES').appendField(t.blkPolyCenter).appendField(new Blockly.FieldNumber(150,0),'CX').appendField(',').appendField(new Blockly.FieldNumber(150,0),'CY').appendField(t.blkPolyR).appendField(new Blockly.FieldNumber(70,5),'R').appendField(t.blkPolyFill).appendField(new Blockly.FieldCheckbox('TRUE'),'FILL');this.setPreviousStatement(true);this.setNextStatement(true);this.setColour('#16A085');this.setTooltip(t.tipPoly);}};
  Blockly.Blocks['draw_text']={init(){this.appendDummyInput().appendField(t.blkDrawText).appendField(new Blockly.FieldTextInput('Hello!'),'TEXT').appendField(t.blkDrawTextAt).appendField(new Blockly.FieldNumber(50,0),'X').appendField(',').appendField(new Blockly.FieldNumber(50,0),'Y').appendField(t.blkDrawTextSize).appendField(new Blockly.FieldNumber(20,6,200,1),'SIZE').appendField(t.blkDrawTextColor).appendField(new Blockly.FieldColour('#333333'),'COLOR');this.setPreviousStatement(true);this.setNextStatement(true);this.setColour('#8E44AD');this.setTooltip(t.tipDrawText);}};
  // NumPy
  Blockly.Blocks['numpy_import']={init(){this.appendDummyInput().appendField('import numpy as').appendField(new Blockly.FieldTextInput('np'),'ALIAS');this.setPreviousStatement(true);this.setNextStatement(true);this.setColour('#3498DB');}};
  Blockly.Blocks['numpy_arange']={init(){this.appendDummyInput().appendField('np.arange(').appendField(new Blockly.FieldNumber(0),'START').appendField(',').appendField(new Blockly.FieldNumber(10),'STOP').appendField(',').appendField(new Blockly.FieldNumber(1),'STEP').appendField(')');this.setOutput(true);this.setColour('#3498DB');}};
  Blockly.Blocks['numpy_mean']={init(){this.appendValueInput('ARR').appendField('np.mean(');this.appendDummyInput().appendField(')');this.setInputsInline(true);this.setOutput(true);this.setColour('#3498DB');}};
  Blockly.Blocks['numpy_sum']={init(){this.appendValueInput('ARR').appendField('np.sum(');this.appendDummyInput().appendField(')');this.setInputsInline(true);this.setOutput(true);this.setColour('#3498DB');}};

  // ── scikit-learn blocks ──────────────────────────────────────────
  // 1. Load dataset
  Blockly.Blocks['sk_load_dataset']={
    init(){
      this.appendDummyInput()
        .appendField(t.skDataset)
        .appendField(new Blockly.FieldDropdown([
          ['Iris (分類)','iris'],['Wine (分類)','wine'],
          ['Breast Cancer (分類)','breast_cancer'],['Digits (分類)','digits'],
          ['California Housing (迴歸)','california_housing'],
        ]),'DATASET')
        .appendField(t.skDatasetVar)
        .appendField(new Blockly.FieldTextInput('X, y'),'VARNAME');
      this.setPreviousStatement(true);this.setNextStatement(true);
      this.setColour('#1abc9c');this.setTooltip(t.tipSkDataset);
    }
  };
  // 2. Train/test split
  Blockly.Blocks['sk_train_test_split']={
    init(){
      this.appendDummyInput()
        .appendField(t.skSplit)
        .appendField(t.skSplitX)
        .appendField(new Blockly.FieldTextInput('X'),'X')
        .appendField(t.skSplitY)
        .appendField(new Blockly.FieldTextInput('y'),'Y')
        .appendField(t.skSplitRatio)
        .appendField(new Blockly.FieldNumber(0.2,0.05,0.5,0.05),'RATIO')
        .appendField(t.skSplitSeed)
        .appendField(new Blockly.FieldNumber(42,0),'SEED');
      this.appendDummyInput().appendField(t.skSplitTo);
      this.setPreviousStatement(true);this.setNextStatement(true);
      this.setColour('#1abc9c');this.setTooltip(t.tipSkSplit);
    }
  };
  // 3. Create model
  Blockly.Blocks['sk_create_model']={
    init(){
      const dd = new Blockly.FieldDropdown([
        [t.skModelKnn||'KNN','knn'],[t.skModelLr||'Linear Regression','lr'],
        [t.skModelDt||'Decision Tree','dt'],[t.skModelSvm||'SVM','svm'],
      ], v => {
        this.updateKField_(v);
      });
      this.appendDummyInput()
        .appendField(t.skModel)
        .appendField(dd,'MODEL_TYPE')
        .appendField(t.skModelVar)
        .appendField(new Blockly.FieldTextInput('model'),'VARNAME');
      this.appendDummyInput('K_ROW')
        .appendField(t.skModelK)
        .appendField(new Blockly.FieldNumber(3,1,50,1),'K');
      this.setPreviousStatement(true);this.setNextStatement(true);
      this.setColour('#1abc9c');this.setTooltip(t.tipSkModel);
    },
    updateKField_(type){
      const kr = this.getInput('K_ROW');
      if(kr) kr.setVisible(type==='knn');
    }
  };
  // 4. Fit
  Blockly.Blocks['sk_fit']={
    init(){
      this.appendDummyInput()
        .appendField(t.skFit)
        .appendField(t.skFitModel).appendField(new Blockly.FieldTextInput('model'),'MODEL')
        .appendField(t.skFitX).appendField(new Blockly.FieldTextInput('X_train'),'X')

function defineBridgeBlocks() {
  const t = T();

  // B1: Set URL
  Blockly.Blocks['bridge_set_url'] = {
    init() {
      this.appendDummyInput()
        .appendField(t.blkBridgeUrl)
        .appendField(new Blockly.FieldTextInput('http://localhost:8765'), 'URL');
      this.setPreviousStatement(true);
      this.setNextStatement(true);
      this.setColour('#f39c12');
    }
  };

  // B2: Send to local
  Blockly.Blocks['bridge_send'] = {
    init() {
      this.appendValueInput('VALUE').appendField(t.blkBridgeSend);
      this.setInputsInline(true);
      this.setPreviousStatement(true);
      this.setNextStatement(true);
      this.setColour('#f39c12');
    }
  };

  // B3: Receive (non-blocking)
  Blockly.Blocks['bridge_recv'] = {
    init() {
      this.appendDummyInput()
        .appendField(t.blkBridgeRecv)
        .appendField(new Blockly.FieldVariable('received'), 'VAR');
      this.setPreviousStatement(true);
      this.setNextStatement(true);

    }
  };

  // B4: Wait-receive with timeout
  Blockly.Blocks['bridge_wait'] = {
    init() {
      this.appendDummyInput()
        .appendField(t.blkBridgeWait)
        .appendField(new Blockly.FieldVariable('received'), 'VAR')

      this.setPreviousStatement(true);
      this.setNextStatement(true);
      this.setColour('#f39c12');
    }
  };

  // B5: Poll loop
  Blockly.Blocks['bridge_poll'] = {
    init() {
      this.appendDummyInput()
        .appendField(t.blkBridgePoll)
        .appendField(new Blockly.FieldNumber(0.5, 0.1, 60, 0.1), 'IV')

      this.appendStatementInput('AFTER').appendField(t.blkBridgePollAfter);
      this.setPreviousStatement(true);
      this.setNextStatement(true);
      this.setColour('#f39c12');
    }
  };
}

function defineBridgeGenerators() {
  // ★ Blockly v10 forBlock API
  const fb = Blockly.Python.forBlock;

  fb['bridge_set_url'] = (b, gen) => {
    const url = b.getFieldValue("URL");
    return `_bridge_url = "${url}"\n`;
  };

  fb['bridge_send'] = (b, gen) => {
    const val = gen.valueToCode(b, "VALUE", gen.Order.NONE) || "''";
    return [
      "from pyodide.http import pyfetch as _pf",
      "import json as _bj",
      "try:",
      `    _bs = await _pf(_bridge_url + "/send", method="POST",`,
      `        headers={"Content-Type": "application/json"},`,
      `        body=_bj.dumps({"value": str(${val})}))`,
      `    _bd = await _bs.json()`,
      `    print("\ud83d\udce4 sent ok  queue:" + str(_bd.get("queue","?")))`,
      "except Exception as _be:",
      `    print("\u274c bridge send error: " + str(_be))`,
      ""
    ].join("\n");
  };

  fb['bridge_recv'] = (b, gen) => {
    const vn = gen.nameDB_.getName(b.getFieldValue("VAR"), Blockly.Names.NameType.VARIABLE);
    return [
      "from pyodide.http import pyfetch as _pf",
      "try:",
      `    _br = await _pf(_bridge_url + "/pull")`,
      `    _bd = await _br.json()`,
      `    ${vn} = _bd["value"] if not _bd["empty"] else None`,
      `    if ${vn} is not None: print("\ud83d\udce5 recv: " + str(${vn}))`,
      "except Exception as _be:",
      `    ${vn} = None`,
      `    print("\u274c bridge recv error: " + str(_be))`,
      ""
    ].join("\n");
  };

  fb['bridge_wait'] = (b, gen) => {
    const vn  = gen.nameDB_.getName(b.getFieldValue("VAR"), Blockly.Names.NameType.VARIABLE);
    const sec = b.getFieldValue("SEC");
    return [
      "from pyodide.http import pyfetch as _pf",
      "import asyncio as _aio",
      `${vn} = None`,
      "_bwt0 = _aio.get_event_loop().time()",
      "while True:",
      "    try:",
      `        _bwr = await _pf(_bridge_url + "/pull")`,
      `        _bwd = await _bwr.json()`,
      `        if not _bwd["empty"]:`,
      `            ${vn} = _bwd["value"]`,
      `            print("\ud83d\udce5 recv: " + str(${vn}))`,
      "            break",
      "    except Exception as _bwe:",
      `        print("\u274c bridge wait error: " + str(_bwe))`,
      "        break",
      `    if _aio.get_event_loop().time() - _bwt0 > ${sec}:`,
      `        print("\u23f1 recv timeout")`,
      "        break",
      "    await _aio.sleep(0.3)",
      ""
    ].join("\n");
  };

  fb['bridge_poll'] = (b, gen) => {
    const vn       = gen.nameDB_.getName(b.getFieldValue("VAR"), Blockly.Names.NameType.VARIABLE);
    const iv       = b.getFieldValue("IV");
    const bodyCode = gen.statementToCode(b, "DO")    || "    pass\n";
    const afterCode= gen.statementToCode(b, "AFTER") || "    pass\n";
    return [
      "from pyodide.http import pyfetch as _pf",
      "import asyncio as _aio",
      "while True:",
      "    try:",
      `        _bpl = await _pf(_bridge_url + "/pull")`,
      `        _bpd = await _bpl.json()`,
      `        if not _bpd["empty"]:`,
      `            ${vn} = _bpd["value"]`,
      bodyCode.replace(/^/gm, "    "),
      "    except Exception as _bpe:",
      `        print("\u274c bridge poll error: " + str(_bpe))`,
      "        break",
      `    await _aio.sleep(${iv})`,
      afterCode,
      ""
    ].join("\n");
  };
}

function definePythonGenerators(){
  // ★ Blockly v10：必須用 forBlock，不可直接指定 Blockly.Python['xxx']
  const fb = Blockly.Python.forBlock;

  // ── 繪圖積木 → 產生乾淨的 screen.* Python ─────────────────────
  // screen 物件在 initPyodide 中注入至 Pyodide 命名空間
  fb['draw_clear']     = (b, gen) => `screen.clear()\n`;
  fb['draw_set_bg']    = (b, gen) => `screen.set_bg('${b.getFieldValue("COLOR")}')\n`;
  fb['draw_set_stroke']= (b, gen) => `screen.set_stroke('${b.getFieldValue("COLOR")}', ${b.getFieldValue("WIDTH")})\n`;
  fb['draw_set_fill']  = (b, gen) => `screen.set_fill('${b.getFieldValue("COLOR")}')\n`;
  fb['draw_line']      = (b, gen) => `screen.draw_line(${b.getFieldValue("X1")}, ${b.getFieldValue("Y1")}, ${b.getFieldValue("X2")}, ${b.getFieldValue("Y2")})\n`;
  fb['draw_rect']      = (b, gen) => `screen.draw_rect(${b.getFieldValue("X")}, ${b.getFieldValue("Y")}, ${b.getFieldValue("W")}, ${b.getFieldValue("H")}, fill=${b.getFieldValue("FILL")==="TRUE"?"True":"False"})\n`;
  fb['draw_circle']    = (b, gen) => `screen.draw_circle(${b.getFieldValue("CX")}, ${b.getFieldValue("CY")}, ${b.getFieldValue("R")}, fill=${b.getFieldValue("FILL")==="TRUE"?"True":"False"})\n`;
  fb['draw_ellipse']   = (b, gen) => `screen.draw_ellipse(${b.getFieldValue("CX")}, ${b.getFieldValue("CY")}, ${b.getFieldValue("RX")}, ${b.getFieldValue("RY")}, fill=${b.getFieldValue("FILL")==="TRUE"?"True":"False"})\n`;
  fb['draw_polygon']   = (b, gen) => `screen.draw_polygon(${b.getFieldValue("SIDES")}, ${b.getFieldValue("CX")}, ${b.getFieldValue("CY")}, ${b.getFieldValue("R")}, fill=${b.getFieldValue("FILL")==="TRUE"?"True":"False"})\n`;
  fb['draw_text']      = (b, gen) => {
    const tx = b.getFieldValue("TEXT").replace(/\\/g,"\\\\").replace(/'/g,"\\'");
    return `screen.draw_text('${tx}', ${b.getFieldValue("X")}, ${b.getFieldValue("Y")}, ${b.getFieldValue("SIZE")}, '${b.getFieldValue("COLOR")}')\n`;
  };

  // ── NumPy ──────────────────────────────────────────────────────
  fb['numpy_import'] = (b, gen) => `import numpy as ${b.getFieldValue("ALIAS")}\n`;
  fb['numpy_arange'] = (b, gen) => [`np.arange(${b.getFieldValue("START")}, ${b.getFieldValue("STOP")}, ${b.getFieldValue("STEP")})`, gen.Order.FUNCTION_CALL];
  fb['numpy_mean']   = (b, gen) => [`np.mean(${gen.valueToCode(b, "ARR", gen.Order.NONE) || "None"})`, gen.Order.FUNCTION_CALL];
  fb['numpy_sum']    = (b, gen) => [`np.sum(${gen.valueToCode(b, "ARR", gen.Order.NONE) || "None"})`,  gen.Order.FUNCTION_CALL];

  // ── scikit-learn ───────────────────────────────────────────────
  fb['sk_load_dataset'] = (b, gen) => {
    const ds = b.getFieldValue("DATASET"), vn = b.getFieldValue("VARNAME");
    const loaders = {iris:"load_iris",wine:"load_wine",breast_cancer:"load_breast_cancer",digits:"load_digits",california_housing:"fetch_california_housing"};
    return `from sklearn.datasets import ${loaders[ds]}\n_ds=${loaders[ds]}()\n${vn} = _ds.data, _ds.target\n`;
  };
  fb['sk_train_test_split'] = (b, gen) =>
    `from sklearn.model_selection import train_test_split\n` +
    `X_train, X_test, y_train, y_test = train_test_split(${b.getFieldValue("X")}, ${b.getFieldValue("Y")}, test_size=${b.getFieldValue("RATIO")}, random_state=${b.getFieldValue("SEED")})\n`;
  fb['sk_create_model'] = (b, gen) => {
    const type=b.getFieldValue("MODEL_TYPE"), vn=b.getFieldValue("VARNAME"), k=b.getFieldValue("K");
    const snippets={
      knn:`from sklearn.neighbors import KNeighborsClassifier\n${vn} = KNeighborsClassifier(n_neighbors=${k})\n`,
      lr: `from sklearn.linear_model import LinearRegression\n${vn} = LinearRegression()\n`,
      dt: `from sklearn.tree import DecisionTreeClassifier\n${vn} = DecisionTreeClassifier(random_state=42)\n`,
      svm:`from sklearn.svm import SVC\n${vn} = SVC(random_state=42)\n`,
    };
    return snippets[type] || "";
  };
  fb['sk_fit']     = (b, gen) => `${b.getFieldValue("MODEL")}.fit(${b.getFieldValue("X")}, ${b.getFieldValue("Y")})\nprint("\u2705 Model trained!")\n`;
  fb['sk_predict'] = (b, gen) => `${b.getFieldValue("RESULT")} = ${b.getFieldValue("MODEL")}.predict(${b.getFieldValue("X")})\n`;
  fb['sk_score']   = (b, gen) => {
    const p = b.getFieldValue("PRINT") === "TRUE";
    return `_acc = ${b.getFieldValue("MODEL")}.score(${b.getFieldValue("X")}, ${b.getFieldValue("Y")})\n` +
           (p ? `print(f"\U0001f4c8 Accuracy: {_acc:.4f} ({_acc*100:.2f}%)")\n` : "");
  };
  fb['sk_report'] = (b, gen) =>
    `from sklearn.metrics import classification_report\nprint(classification_report(${b.getFieldValue("TRUE_Y")}, ${b.getFieldValue("PRED_Y")}))\n`;
}

`);
    pyodideReady=true;
    document.getElementById('engineStatus').className='ready';
    document.getElementById('engineLabel').textContent=T().engineReady;
    document.getElementById('runBtn').disabled=false;
    appendOutput(T().initOk,'line-ok');
    appendOutput(T().initHint1,'line-info');
    appendOutput(T().initHint2,'line-info');
  // Bridge banner
  if (location.protocol === 'file:') {
    appendOutput('', 'line-info');
    appendOutput('⚠️  橋接狀態燈提示：', 'line-warn');
    appendOutput('   從檔案開啟時，某些瀏覽器會限制 fetch 到 localhost', 'line-warn');
    appendOutput('   建議：執行 blockpy_bridge.py → 點「🌐 開啟工具」按鈕', 'line-warn');
    appendOutput('   這樣從 http://127.0.0.1:8765 開啟，橋接狀態燈必定正常', 'line-warn');
    appendOutput('', 'line-info');
  } else {
    appendOutput('🔌 橋接積木可用！工具箱 → 🔌 橋接 分類', 'line-info');
  }
  }catch(err){
    document.getElementById('engineStatus').className='error';
    document.getElementById('engineLabel').textContent=T().engineFail;
    appendOutput('❌ '+err.message,'line-err');
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  S8 ── RUN CODE
// ═══════════════════════════════════════════════════════════════════════
async function runCode(){
  if(!pyodideReady){appendOutput(T().pyNotReady,'line-warn');return;}
  // 三欄佈局：永遠執行中欄 Python 程式碼（積木變動時已自動同步）
  const code=document.getElementById('codeEditor').value;
  if(!code.trim()){appendOutput(T().runWarn,'line-warn');return;}
  const btn=document.getElementById('runBtn');
  btn.querySelector('[data-i18n]').textContent='⏳';
  btn.disabled=true;
  if(code.includes("getElementById('drawCanvas')") || code.includes("screen.")){ switchTab('canvas'); }
  appendOutput(T().runStart,'line-info');
  try{
    await pyodide.runPythonAsync(code);
    await updateVarPanel();
    appendOutput(T().runDone,'line-ok');
  }catch(err){
    appendOutput(err.message,'line-err');
    switchTab('output');
  }finally{
    btn.querySelector('[data-i18n]').textContent=T().btnRun;
    btn.disabled=false;
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  S9 ── EXPORT  (.py download + canvas PNG download)
// ═══════════════════════════════════════════════════════════════════════
function exportPy(){
  const code=document.getElementById('codeEditor').value;
  const header=`# Generated by BlockPy × Pyodide (Stage 4)\n# ${new Date().toLocaleString()}\n\n`;
  const blob=new Blob([header+code],{type:'text/x-python'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`blockpy_${Date.now()}.py`;
  a.click(); URL.revokeObjectURL(a.href);
  appendOutput(T().exportPyOk,'line-ok');
  switchTab('output');
}

function exportPng(){
  const canvas=document.getElementById('drawCanvas');
  // 檢查是否有內容（取左上角像素）
  const px=canvas.getContext('2d').getImageData(0,0,1,1).data;
  if(px[3]===0){appendOutput(T().exportPngWarn,'line-warn');switchTab('canvas');return;}
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download=`blockpy_canvas_${Date.now()}.png`;
  a.click();
  appendOutput(T().exportPngOk,'line-ok');
  switchTab('output');
}

// ═══════════════════════════════════════════════════════════════════════
//  S10 ── CANVAS / VAR / UTILS
// ═══════════════════════════════════════════════════════════════════════
function clearCanvas(){const c=document.getElementById('drawCanvas');c.getContext('2d').clearRect(0,0,c.width,c.height);switchTab('canvas');}
function resizeCanvas(){const[w,h]=document.getElementById('canvasSizeSelect').value.split(',').map(Number);const c=document.getElementById('drawCanvas');c.width=w;c.height=h;document.getElementById('canvasSizeLabel').textContent=`${w}×${h}`;}
async function updateVarPanel(){
  if(!pyodideReady)return;
  try{
    const json=await pyodide.runPythonAsync(`
import json as _j
_sk={'__name__','__doc__','__package__','__loader__','__spec__','__builtins__','_O','_E','sys','io','_j'}
def _r(v):
    try:
        import numpy as np
        if isinstance(v,np.ndarray):return f'ndarray {v.shape} {v.dtype}'
    except:pass
    try:
        s=repr(v);return s if len(s)<100 else s[:100]+'…'
    except:return '?'
_j.dumps({k:{'val':_r(v),'type':type(v).__name__} for k,v in globals().items() if not k.startswith('_') and k not in _sk and not callable(v)})
`);
    const vars=JSON.parse(json);
    const el=document.getElementById('varContent');
    el.innerHTML=Object.keys(vars).length
      ?Object.entries(vars).map(([n,i])=>`<div class="var-row"><span class="var-name">${escHtml(n)}</span><span class="var-type">${escHtml(i.type)}</span><span class="var-val">${escHtml(i.val)}</span></div>`).join('')
      :`<span style="color:var(--muted);font-size:12px;">${T().noVar}</span>`;
  }catch{}
}
function appendOutput(text,cls='line-out'){const box=document.getElementById('outputBox');const s=document.createElement('span');s.className=cls;s.textContent=text+'\n';box.appendChild(s);box.scrollTop=box.scrollHeight;}
function clearOutput(){document.getElementById('outputBox').innerHTML='';document.getElementById('varContent').textContent=T().varEmpty;}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ═══════════════════════════════════════════════════════════════════════
//  BRIDGE ── Status polling & popup
// ═══════════════════════════════════════════════════════════════════════
var _bridge_url_js = 'http://127.0.0.1:8765';
var _bridge_connected = false;
var _bridge_url_js_locked = false; // set true when user manually changes URL

// ── URL setter ─────────────────────────────────────────────────────────
function setBridgeUrl(url) {
  _bridge_url_js_locked = true;
  _bridge_url_js = url.trim();
  document.getElementById('bUrlInput').value = _bridge_url_js;
  if (window.pyodide) {
    try { window.pyodide.runPython('_bridge_url = "' + _bridge_url_js + '"'); } catch(e) {}
  }
  checkBridgeStatus();
}

// ── Popup toggle ───────────────────────────────────────────────────────
function toggleBPopup() {
  document.getElementById('bPopup').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  var bs = document.getElementById('bridgeStatus');
  if (bs && !bs.contains(e.target)) {
    document.getElementById('bPopup').classList.remove('open');
  }
});

// ── Status check (tries 127.0.0.1 AND localhost) ───────────────────────
async function checkBridgeStatus() {
  // If served from the bridge server itself, use relative URL for reliability
  if (location.protocol === 'http:' && !_bridge_url_js_locked) {
    var autoUrl = location.protocol + '//' + location.host;
    if (autoUrl !== _bridge_url_js) {
      _bridge_url_js = autoUrl;
      var inp = document.getElementById('bUrlInput');
      if (inp) inp.value = autoUrl;
    }
  }
  var el   = document.getElementById('bridgeStatus');
  var lbl  = document.getElementById('bLabel');
  var stat = document.getElementById('bStats');

  // Build candidate URL list: try current URL, and swap localhost↔127.0.0.1
  var urls = [_bridge_url_js];
  if (_bridge_url_js.includes('localhost')) {
    urls.push(_bridge_url_js.replace('localhost', '127.0.0.1'));
  } else if (_bridge_url_js.includes('127.0.0.1')) {
    urls.push(_bridge_url_js.replace('127.0.0.1', 'localhost'));
  }

  var lastErr = '';
  for (var i = 0; i < urls.length; i++) {
    var url = urls[i];
    try {
      var ctrl = new AbortController();
      var timer = setTimeout(function() { ctrl.abort(); }, 2000);
      var r = await fetch(url + '/status', { signal: ctrl.signal });
      clearTimeout(timer);
      var d = await r.json();

      // ✅ Success — update URL to the one that worked
      _bridge_url_js = url;
      document.getElementById('bUrlInput').value = url;
      if (window.pyodide) {
        try { window.pyodide.runPython('_bridge_url = "' + url + '"'); } catch(e) {}
      }

      el.setAttribute('class', 'bs-ok');
      lbl.textContent = '🔌 橋接 ✓';
      stat.innerHTML =
        '<b>URL:</b> ' + url + '<br>' +
        '佇列 ↑' + d.q_to_browser + ' ↓' + d.q_to_local + '<br>' +
        'push:' + d.n_push + '  pull:' + d.n_pull +
        '  send:' + d.n_send + '  recv:' + d.n_recv;

      if (!_bridge_connected) {
        _bridge_connected = true;
        appendBridgeLog('🔌 橋接器連線成功！' + url, 'bl-recv');
      }
      return;

    } catch(e) {
      lastErr = String(e);
      clearTimeout && clearTimeout();
    }
  }

  // ❌ All URLs failed
  _bridge_connected = false;
  el.setAttribute('class', 'bs-off');
  lbl.textContent = '🔌 橋接 ─';
  stat.innerHTML =
    '未連線 — 請先執行 <b>blockpy_bridge.py</b><br>' +
    '並點「▶ 啟動橋接器」<br><br>' +
    '<span style="color:#888;font-size:9px;">' + lastErr.slice(0, 80) + '</span>';
}

function startBridgePoll() {
  // Poll fast at first (every 1s), then slow down to every 3s after connect
  checkBridgeStatus();
  var fastPoll = setInterval(function() {
    checkBridgeStatus();
    if (_bridge_connected) {
      clearInterval(fastPoll);
      setInterval(checkBridgeStatus, 3000); // slow poll after connected
    }
  }, 1000);
}

function appendBridgeLog(text, cls) {
  cls = cls || 'bl-info';
  var box = document.getElementById('bridgeLog');
  var s = document.createElement('span');
  s.className = cls;
  var ts = new Date().toTimeString().slice(0, 8);
  s.textContent = '[' + ts + '] ' + text + '\n';
  box.appendChild(s);
  box.scrollTop = box.scrollHeight;
}

// ── Startup ──────────────────────────────────────────────────────
applyUiLang();
renderGallery();
initPyodide();
startBridgePoll();
